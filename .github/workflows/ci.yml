name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: plantParentHood

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: plantParentHood/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
